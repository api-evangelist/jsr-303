aid: jsr-303
name: JSR-303
description: >-
  JSR-303 (Bean Validation) is a Java specification that defines a metadata
  model and API for JavaBean validation. It provides a standard way to define
  validation constraints on Java objects using annotations, enabling developers
  to enforce business rules and data integrity at the object level.
